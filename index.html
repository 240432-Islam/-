<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Монитор статусов</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- ✅ UMD версия — работает без import/module -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #7c6af7;
      --accent2: #4fc8a8;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --online: #4fc8a8;
      --away: #f5a623;
      --busy: #f45b5b;
      --dnd: #6b6b80;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    /* HEADER */
    .header {
      margin-bottom: 24px;
    }

    .header-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      margin-bottom: 8px;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
    }

    .header h1 span {
      color: var(--accent);
    }

    /* MY STATUS CARD */
    .my-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .my-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .my-card-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .my-card-content {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .my-avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: white;
      flex-shrink: 0;
    }

    .my-details { flex: 1; }

    .my-name {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
    }

    .my-status {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot-sm {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* STATUS BUTTONS */
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }

    .status-btn {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
    }

    .status-btn:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-1px);
    }

    .status-btn:active { transform: translateY(0); }

    .status-btn .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-btn.active {
      border-color: var(--accent);
      background: rgba(124, 106, 247, 0.1);
    }

    /* STATS BAR */
    .stats-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      gap: 0;
      margin-bottom: 20px;
    }

    .stat {
      flex: 1;
      text-align: center;
      position: relative;
    }

    .stat + .stat::before {
      content: '';
      position: absolute;
      left: 0; top: 10%; bottom: 10%;
      width: 1px;
      background: var(--border);
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-num.green { color: var(--online); }
    .stat-num.yellow { color: var(--away); }
    .stat-num.red { color: var(--busy); }

    .stat-lbl {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    /* MEMBERS LIST */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title .count-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .user-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .user-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.15s;
    }

    .user-item:hover {
      border-color: var(--border);
      background: var(--surface2);
    }

    .user-item.is-me {
      border-color: rgba(124, 106, 247, 0.4);
      background: rgba(124, 106, 247, 0.05);
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--muted);
      flex-shrink: 0;
      position: relative;
    }

    .avatar-badge {
      position: absolute;
      bottom: -3px; right: -3px;
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .user-meta { flex: 1; min-width: 0; }

    .user-name {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-name .you-tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--accent);
      background: rgba(124, 106, 247, 0.15);
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
    }

    .user-status-text {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-indicator {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    /* EMPTY / LOADING */
    .state-msg {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .pulse {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 20px;
      padding-bottom: 8px;
    }

    .live-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--accent2);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-label">Realtime Monitor</div>
    <h1>Статусы <span>группы</span></h1>
  </div>

  <!-- МОЯ КАРТОЧКА -->
  <div class="my-card">
    <div class="my-card-label">Ваш профиль</div>
    <div class="my-card-content">
      <div class="my-avatar" id="myAvatar">?</div>
      <div class="my-details">
        <div class="my-name" id="myName">Загрузка...</div>
        <div class="my-status">
          <div class="status-dot-sm" id="myDot" style="background: var(--muted)"></div>
          <span id="myStatusText">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- КНОПКИ СТАТУСА -->
  <div class="status-grid">
    <button class="status-btn" id="btn-online" onclick="changeStatus('В сети')">
      <div class="dot" style="background:#4fc8a8"></div> В сети
    </button>
    <button class="status-btn" id="btn-away" onclick="changeStatus('Отошёл')">
      <div class="dot" style="background:#f5a623"></div> Отошёл
    </button>
    <button class="status-btn" id="btn-busy" onclick="changeStatus('Занят')">
      <div class="dot" style="background:#f45b5b"></div> Занят
    </button>
    <button class="status-btn" id="btn-dnd" onclick="changeStatus('Не беспокоить')">
      <div class="dot" style="background:#6b6b80"></div> Не беспокоить
    </button>
  </div>

  <!-- СТАТИСТИКА -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num green" id="cnt-online">0</div>
      <div class="stat-lbl">онлайн</div>
    </div>
    <div class="stat">
      <div class="stat-num yellow" id="cnt-away">0</div>
      <div class="stat-lbl">отошли</div>
    </div>
    <div class="stat">
      <div class="stat-num red" id="cnt-busy">0</div>
      <div class="stat-lbl">заняты</div>
    </div>
  </div>

  <!-- СПИСОК -->
  <div class="section-title">
    Участники <span class="count-badge" id="total-count">0</span>
  </div>
  <div class="user-list" id="userList">
    <div class="state-msg pulse">Подключение...</div>
  </div>

  <div class="footer">
    <span class="live-dot"></span>Обновление в реальном времени · Supabase Realtime
  </div>

</div>

<script>
  // ✅ UMD — supabase доступен как глобальный объект window.supabase
  const { createClient } = window.supabase;

  const SUPABASE_URL = 'https://amcacekhqgycrnqzgtch.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_2pt4bLheDvE-TU-9m129UQ_YyY0YxER';
  const MY_ID = 'a8e2f841-4c1c-4f85-9b37-f7876c21a395';

  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Цвета и эмодзи по статусу
  const STATUS_MAP = {
    'В сети':        { color: '#4fc8a8', emoji: '🟢', btn: 'btn-online' },
    'Отошёл':        { color: '#f5a623', emoji: '🟡', btn: 'btn-away' },
    'Занят':         { color: '#f45b5b', emoji: '🔴', btn: 'btn-busy' },
    'Не беспокоить': { color: '#6b6b80', emoji: '⚫', btn: 'btn-dnd' },
  };

  // ── Изменить статус ──────────────────────────────
  window.changeStatus = async (text) => {
    // Визуальный отклик — подсветить активную кнопку
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    const map = STATUS_MAP[text];
    if (map) document.getElementById(map.btn)?.classList.add('active');

    const { error } = await db
      .from('profiles')
      .update({ status: text })
      .eq('id', MY_ID);

    if (error) {
      console.error('Update error:', error);
      alert('Ошибка обновления статуса: ' + error.message);
    }
  };

  // ── Аватар-инициал ───────────────────────────────
  function getInitial(name) {
    return (name || '?').charAt(0).toUpperCase();
  }

  // ── Обновить мою карточку ────────────────────────
  function updateMyCard(user) {
    if (!user) return;
    document.getElementById('myAvatar').textContent = getInitial(user.username);
    document.getElementById('myName').textContent = user.username || 'Без имени';
    document.getElementById('myStatusText').textContent = user.status || '—';
    document.getElementById('myDot').style.background = user.color || '#6b6b80';

    // Подсветить кнопку
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    const map = STATUS_MAP[user.status];
    if (map) document.getElementById(map.btn)?.classList.add('active');
  }

  // ── Отрисовать список ────────────────────────────
  function renderUsers(users) {
    const list = document.getElementById('userList');

    if (!users?.length) {
      list.innerHTML = '<div class="state-msg">Нет участников</div>';
      return;
    }

    // Сортировка: сначала онлайн, потом по имени
    const sorted = [...users].sort((a, b) => {
      const aOnline = a.status === 'В сети' ? 0 : 1;
      const bOnline = b.status === 'В сети' ? 0 : 1;
      if (aOnline !== bOnline) return aOnline - bOnline;
      return (a.username || '').localeCompare(b.username || '');
    });

    list.innerHTML = sorted.map(u => {
      const map = STATUS_MAP[u.status] || { color: '#6b6b80', emoji: '⚪' };
      const isMe = u.id === MY_ID;
      return `
        <div class="user-item ${isMe ? 'is-me' : ''}">
          <div class="avatar">
            ${getInitial(u.username)}
            <div class="avatar-badge" style="background:${map.color}"></div>
          </div>
          <div class="user-meta">
            <div class="user-name">
              ${u.username || 'Без имени'}
              ${isMe ? '<span class="you-tag">вы</span>' : ''}
            </div>
            <div class="user-status-text">${map.emoji} ${u.status || 'Нет статуса'}</div>
          </div>
          <div class="status-indicator">${map.emoji}</div>
        </div>
      `;
    }).join('');

    // Статистика
    const total = users.length;
    const online = users.filter(u => u.status === 'В сети').length;
    const away = users.filter(u => u.status === 'Отошёл').length;
    const busy = users.filter(u => u.status === 'Занят' || u.status === 'Не беспокоить').length;

    document.getElementById('total-count').textContent = total;
    document.getElementById('cnt-online').textContent = online;
    document.getElementById('cnt-away').textContent = away;
    document.getElementById('cnt-busy').textContent = busy;

    updateMyCard(users.find(u => u.id === MY_ID));
  }

  // ── Загрузить данные ─────────────────────────────
  async function loadData() {
    const { data, error } = await db
      .from('profiles')
      .select('*')
      .order('username', { ascending: true });

    if (error) {
      console.error('Load error:', error);
      document.getElementById('userList').innerHTML =
        `<div class="state-msg" style="color:#f45b5b">Ошибка: ${error.message}</div>`;
      return;
    }

    renderUsers(data || []);
  }

  // ── Realtime подписка ────────────────────────────
  function subscribe() {
    db.channel('profiles_realtime')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'profiles' },
        () => loadData()
      )
      .subscribe();
  }

  // ── Старт ────────────────────────────────────────
  async function init() {
    await loadData();
    subscribe();
    // Запасной поллинг каждые 5 секунд
    setInterval(loadData, 5000);
  }

  init().catch(console.error);
</script>
</body>
</html>
